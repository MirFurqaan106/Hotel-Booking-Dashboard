version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/hotel.db
      - JWT_SECRET=super_secret_key_1029384756
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      - ADMIN_EMAIL=mirfurkaan106@gmail.com
      - ADMIN_PHONE=+91 7889984798

  frontend:
